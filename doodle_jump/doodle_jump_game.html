<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Doodle Jump</title>
  <style>
    :root {
      --ink: #232323;
      --paper: #fbfbf4;
      --panel: rgba(255, 255, 248, 0.92);
      --accent: #ffcf4d;
      --green: #70c461;
      --blue: #48a9e6;
      --danger: #d94a3d;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--paper);
      color: var(--ink);
      font-family: "Comic Sans MS", "Trebuchet MS", system-ui, sans-serif;
      touch-action: none;
      user-select: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: default;
    }

    .ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .hud {
      position: absolute;
      top: max(12px, env(safe-area-inset-top));
      left: 12px;
      right: 12px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      pointer-events: none;
    }

    .scorebox {
      min-width: 104px;
      padding: 8px 12px;
      border: 3px solid var(--ink);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.16);
      font-weight: 900;
      line-height: 1.15;
    }

    .scorebox small {
      display: block;
      font-size: 12px;
      opacity: 0.75;
    }

    .icon-btn, .text-btn, select {
      pointer-events: auto;
      border: 3px solid var(--ink);
      border-radius: 8px;
      background: #fffdf3;
      color: var(--ink);
      font: 900 16px/1 "Comic Sans MS", "Trebuchet MS", system-ui, sans-serif;
      box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.22);
    }

    .icon-btn {
      width: 48px;
      height: 44px;
      display: grid;
      place-items: center;
      padding: 0;
    }

    .icon-btn:active, .text-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 rgba(0, 0, 0, 0.22);
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      padding: 16px;
      background: linear-gradient(rgba(255,255,255,0.2), rgba(255,255,255,0.45));
      pointer-events: auto;
    }

    .overlay.active { display: grid; }

    .panel {
      width: min(430px, calc(100vw - 28px));
      max-height: min(760px, calc(100vh - 28px));
      overflow: auto;
      padding: 18px;
      border: 4px solid var(--ink);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 7px 7px 0 rgba(0,0,0,0.18);
    }

    h1, h2 {
      margin: 0 0 12px;
      text-align: center;
      letter-spacing: 0;
      line-height: 1;
    }

    h1 {
      font-size: clamp(42px, 12vw, 76px);
      text-shadow: 3px 3px 0 #ffcf4d, -2px -2px 0 #80d4ff;
    }

    h2 { font-size: 32px; }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin: 10px 0;
    }

    .button-stack {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .text-btn {
      min-height: 48px;
      padding: 10px 14px;
      background: var(--accent);
    }

    .text-btn.secondary { background: #dff4ff; }
    .text-btn.danger { background: #ffb4ac; }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 14px 0;
    }

    .stat, .list-box {
      padding: 10px;
      border: 3px dashed rgba(35,35,35,0.7);
      border-radius: 8px;
      background: rgba(255,255,255,0.5);
    }

    .stat strong {
      display: block;
      font-size: 24px;
    }

    ol, ul {
      margin: 8px 0 0;
      padding-left: 24px;
    }

    li { margin: 4px 0; }

    label {
      display: flex;
      gap: 8px;
      align-items: center;
      font-weight: 900;
    }

    input[type="checkbox"] {
      width: 22px;
      height: 22px;
      accent-color: var(--green);
    }

    select {
      max-width: 170px;
      padding: 8px;
      background: #fff;
    }

    .mobile-controls {
      position: absolute;
      left: 0;
      right: 0;
      bottom: max(12px, env(safe-area-inset-bottom));
      display: none;
      justify-content: space-between;
      padding: 0 18px;
      pointer-events: none;
    }

    .mobile-controls .icon-btn {
      width: 72px;
      height: 58px;
      font-size: 28px;
      pointer-events: auto;
      opacity: 0.72;
    }

    @media (hover: none), (max-width: 760px) {
      .mobile-controls { display: flex; }
      .scorebox { font-size: 14px; }
      .panel { padding: 14px; }
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" aria-label="Doodle Jump canvas"></canvas>

  <div class="ui">
    <div class="hud">
      <div class="scorebox">
        <small>Score</small>
        <span id="scoreText">0</span>
      </div>
      <button id="pauseBtn" class="icon-btn" title="Pause">||</button>
    </div>

    <div id="menuScreen" class="overlay active">
      <section class="panel">
        <h1>Doodle Jump</h1>
        <div class="stats">
          <div class="stat"><small>High Score</small><strong id="menuHigh">0</strong></div>
          <div class="stat"><small>Best Height</small><strong id="menuBest">0</strong></div>
        </div>
        <div class="button-stack">
          <button id="playBtn" class="text-btn">Play</button>
          <button id="settingsBtn" class="text-btn secondary">Settings</button>
          <button id="leaderBtn" class="text-btn secondary">Leaderboard</button>
        </div>
      </section>
    </div>

    <div id="pauseScreen" class="overlay">
      <section class="panel">
        <h2>Paused</h2>
        <div class="button-stack">
          <button id="resumeBtn" class="text-btn">Resume</button>
          <button id="pauseMenuBtn" class="text-btn secondary">Menu</button>
        </div>
      </section>
    </div>

    <div id="gameOverScreen" class="overlay">
      <section class="panel">
        <h2>Game Over</h2>
        <div class="stats">
          <div class="stat"><small>Score</small><strong id="finalScore">0</strong></div>
          <div class="stat"><small>High Score</small><strong id="finalHigh">0</strong></div>
        </div>
        <div class="list-box">
          <strong>Achievements</strong>
          <ul id="achievementList"></ul>
        </div>
        <div class="button-stack">
          <button id="retryBtn" class="text-btn">Retry</button>
          <button id="gameOverMenuBtn" class="text-btn secondary">Menu</button>
        </div>
      </section>
    </div>

    <div id="settingsScreen" class="overlay">
      <section class="panel">
        <h2>Settings</h2>
        <div class="row">
          <label><input id="soundToggle" type="checkbox"> Sound</label>
          <label><input id="vibrationToggle" type="checkbox"> Vibration</label>
        </div>
        <div class="row">
          <label for="skinSelect">Skin</label>
          <select id="skinSelect">
            <option value="bunny">Bunny</option>
            <option value="alien">Alien</option>
            <option value="ninja">Ninja</option>
          </select>
        </div>
        <div class="row">
          <label for="themeSelect">Theme</label>
          <select id="themeSelect">
            <option value="day">Day</option>
            <option value="night">Night</option>
            <option value="space">Space</option>
            <option value="jungle">Jungle</option>
          </select>
        </div>
        <div class="button-stack">
          <button id="settingsBackBtn" class="text-btn">Back</button>
        </div>
      </section>
    </div>

    <div id="leaderScreen" class="overlay">
      <section class="panel">
        <h2>Leaderboard</h2>
        <div class="list-box">
          <ol id="leaderboardList"></ol>
        </div>
        <div class="button-stack">
          <button id="leaderBackBtn" class="text-btn">Back</button>
        </div>
      </section>
    </div>

    <div class="mobile-controls">
      <button id="leftBtn" class="icon-btn" title="Move left">&lt;</button>
      <button id="rightBtn" class="icon-btn" title="Move right">&gt;</button>
    </div>
  </div>

  <script>
  (() => {
    "use strict";

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d", { alpha: false });
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));

    const ui = {
      score: document.getElementById("scoreText"),
      pauseBtn: document.getElementById("pauseBtn"),
      screens: {
        menu: document.getElementById("menuScreen"),
        pause: document.getElementById("pauseScreen"),
        gameover: document.getElementById("gameOverScreen"),
        settings: document.getElementById("settingsScreen"),
        leaderboard: document.getElementById("leaderScreen")
      },
      menuHigh: document.getElementById("menuHigh"),
      menuBest: document.getElementById("menuBest"),
      finalScore: document.getElementById("finalScore"),
      finalHigh: document.getElementById("finalHigh"),
      achievements: document.getElementById("achievementList"),
      leaderboard: document.getElementById("leaderboardList"),
      sound: document.getElementById("soundToggle"),
      vibration: document.getElementById("vibrationToggle"),
      skin: document.getElementById("skinSelect"),
      theme: document.getElementById("themeSelect")
    };

    const buttons = {
      play: document.getElementById("playBtn"),
      settings: document.getElementById("settingsBtn"),
      leader: document.getElementById("leaderBtn"),
      resume: document.getElementById("resumeBtn"),
      pauseMenu: document.getElementById("pauseMenuBtn"),
      retry: document.getElementById("retryBtn"),
      overMenu: document.getElementById("gameOverMenuBtn"),
      settingsBack: document.getElementById("settingsBackBtn"),
      leaderBack: document.getElementById("leaderBackBtn"),
      left: document.getElementById("leftBtn"),
      right: document.getElementById("rightBtn")
    };

    const rand = (a, b) => a + Math.random() * (b - a);
    const clamp = (n, a, b) => Math.max(a, Math.min(b, n));

    const storage = {
      get(key, fallback) {
        try { return JSON.parse(localStorage.getItem(key)) ?? fallback; }
        catch (_) { return fallback; }
      },
      set(key, value) {
        try { localStorage.setItem(key, JSON.stringify(value)); }
        catch (_) {}
      }
    };

    const settings = storage.get("doodleSettings", {
      sound: true,
      vibration: true,
      skin: "bunny",
      theme: "day"
    });
    const progress = storage.get("doodleProgress", {
      highScore: 0,
      bestHeight: 0,
      leaderboard: [],
      achievements: {}
    });

    ui.sound.checked = settings.sound;
    ui.vibration.checked = settings.vibration;
    ui.skin.value = settings.skin;
    ui.theme.value = settings.theme;

    const MAX_GAME_WIDTH = 520;
    let W = 420, H = 720;
    let state = "menu";
    let cameraY = 0;
    let maxHeight = 0;
    let score = 0;
    let platformsPassed = 0;
    let springChain = 0;
    let frameTime = 0;
    let lastTime = 0;
    let worldTop = 0;
    let audioCtx = null;
    let musicTimer = 0;
    let tiltX = 0;

    const keys = { left: false, right: false };
    const pools = { particles: [] };
    let platforms = [];
    let bonuses = [];
    let enemies = [];
    let projectiles = [];

    class Player {
      constructor() { this.reset(); }
      reset() {
        this.w = 44;
        this.h = 54;
        this.x = W / 2 - this.w / 2;
        this.y = H - 150;
        this.vx = 0;
        this.vy = -12;
        this.facing = 1;
        this.squash = 0;
        this.spin = 0;
        this.invincible = 0;
        this.fly = 0;
        this.dead = false;
      }
      update(dt) {
        const input = (keys.right ? 1 : 0) - (keys.left ? 1 : 0);
        const mobileTilt = Math.abs(tiltX) > 0.08 ? clamp(tiltX * 1.8, -1, 1) : 0;
        const dir = input || mobileTilt;
        this.vx += dir * 0.85 * dt;
        this.vx *= Math.pow(0.86, dt);
        this.vx = clamp(this.vx, -6.5, 6.5);
        if (Math.abs(this.vx) > 0.15) this.facing = Math.sign(this.vx);

        if (this.fly > 0) {
          this.fly -= dt;
          this.invincible = Math.max(this.invincible, 20);
          this.vy = -15;
          this.spin += 0.32 * dt;
          addTrail(this.x + this.w / 2, this.y + this.h);
        } else {
          this.vy += 0.5 * dt;
        }

        this.x += this.vx * dt;
        this.y += this.vy * dt;
        if (this.x > W) this.x = -this.w;
        if (this.x + this.w < 0) this.x = W;
        this.squash *= Math.pow(0.82, dt);
        this.invincible = Math.max(0, this.invincible - dt);
      }
      jump(power, superJump = false) {
        this.vy = power;
        this.squash = 1;
        if (superJump) this.spin += Math.PI * 1.2;
        playSound(superJump ? "whoosh" : "jump");
      }
      draw() {
        const x = this.x, y = this.y - cameraY;
        const sx = 1 + this.squash * 0.12;
        const sy = 1 - this.squash * 0.18;
        ctx.save();
        ctx.translate(x + this.w / 2, y + this.h / 2);
        ctx.rotate(this.spin);
        ctx.scale(this.facing * sx, sy);
        drawPlayerSkin(settings.skin, -this.w / 2, -this.h / 2, this.w, this.h);
        ctx.restore();
      }
    }

    class Platform {
      constructor(x, y, type = "normal") {
        this.x = x; this.y = y; this.w = 74; this.h = 16;
        this.type = type;
        this.vx = type === "moving" ? rand(1.2, 2.4) * (Math.random() < 0.5 ? -1 : 1) : 0;
        this.touched = false;
        this.breaking = 0;
        this.gone = false;
        this.shake = 0;
        this.hasSpring = type === "springy" || Math.random() < 0.1;
      }
      update(dt) {
        if (this.type === "moving") {
          this.x += this.vx * dt;
          if (this.x < 8 || this.x + this.w > W - 8) this.vx *= -1;
        }
        if (this.breaking > 0) {
          this.breaking += dt;
          this.y += this.breaking * 0.8 * dt;
          this.shake = 7;
          if (this.breaking > 55) this.gone = true;
        }
        if (this.type === "disappear" && this.touched) {
          this.breaking += dt;
          if (this.breaking > 80) this.gone = true;
        }
        this.shake *= Math.pow(0.7, dt);
      }
      draw() {
        if (this.gone) return;
        const x = this.x + (this.shake ? rand(-this.shake, this.shake) : 0);
        const y = this.y - cameraY;
        let fill = "#70c461";
        if (this.type === "moving") fill = "#48a9e6";
        if (this.type === "breakable") fill = "#a86b3f";
        if (this.type === "disappear") fill = "#fbfbfb";
        ctx.save();
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#222";
        ctx.fillStyle = fill;
        roundedRect(x, y, this.w, this.h, 7, true, true);
        ctx.beginPath();
        ctx.moveTo(x + 8, y + 6);
        ctx.bezierCurveTo(x + 24, y + 1, x + 42, y + 13, x + this.w - 7, y + 5);
        ctx.strokeStyle = "rgba(255,255,255,0.55)";
        ctx.lineWidth = 2;
        ctx.stroke();
        if (this.type === "breakable") {
          ctx.strokeStyle = "#51331d";
          ctx.beginPath();
          ctx.moveTo(x + 18, y + 2); ctx.lineTo(x + 26, y + 14);
          ctx.moveTo(x + 43, y + 1); ctx.lineTo(x + 36, y + 15);
          ctx.stroke();
        }
        if (this.hasSpring && !this.gone) drawSpring(x + this.w * 0.58, y - 16, 16, 20);
        ctx.restore();
      }
    }

    class Bonus {
      constructor(platform) {
        this.kind = Math.random() < 0.5 ? "rocket" : (Math.random() < 0.5 ? "propeller" : "hat");
        this.x = platform.x + rand(10, platform.w - 28);
        this.y = platform.y - 32;
        this.w = 24; this.h = 28;
        this.gone = false;
        this.t = rand(0, 20);
      }
      update(dt) { this.t += dt; }
      draw() {
        const x = this.x, y = this.y - cameraY + Math.sin(this.t * 0.08) * 3;
        ctx.save();
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#222";
        if (this.kind === "rocket") {
          ctx.fillStyle = "#f05c45";
          roundedRect(x + 6, y, 12, 24, 6, true, true);
          ctx.fillStyle = "#ffd15c";
          tri(x + 12, y + 27, x + 6, y + 20, x + 18, y + 20, true);
          ctx.fillStyle = "#aee8ff";
          circle(x + 12, y + 8, 4, true);
        } else if (this.kind === "propeller") {
          ctx.fillStyle = "#6dd1ff";
          circle(x + 12, y + 17, 8, true);
          ctx.beginPath();
          ctx.ellipse(x + 5, y + 5, 10, 4, -0.4, 0, Math.PI * 2);
          ctx.ellipse(x + 20, y + 5, 10, 4, 0.4, 0, Math.PI * 2);
          ctx.fillStyle = "#ffe36e"; ctx.fill(); ctx.stroke();
        } else {
          ctx.fillStyle = "#222";
          roundedRect(x + 3, y + 8, 18, 12, 4, true, true);
          ctx.beginPath();
          ctx.moveTo(x, y + 20); ctx.lineTo(x + 24, y + 20); ctx.stroke();
        }
        ctx.restore();
      }
    }

    class Enemy {
      constructor(y, kind) {
        this.kind = kind || (Math.random() < 0.72 ? "monster" : (Math.random() < 0.55 ? "hole" : "ufo"));
        this.x = rand(40, W - 80);
        this.y = y;
        this.w = this.kind === "hole" ? 54 : 48;
        this.h = this.kind === "hole" ? 54 : 38;
        this.vx = rand(0.8, 1.8) * (Math.random() < 0.5 ? -1 : 1);
        this.cooldown = rand(50, 120);
      }
      update(dt) {
        if (this.kind !== "hole") {
          this.x += this.vx * dt;
          if (this.x < 10 || this.x + this.w > W - 10) this.vx *= -1;
        }
        if (this.kind === "ufo") {
          this.cooldown -= dt;
          if (this.cooldown <= 0) {
            projectiles.push({ x: this.x + this.w / 2, y: this.y + this.h, vy: 5, r: 5 });
            this.cooldown = rand(75, 130);
          }
        }
      }
      draw() {
        const x = this.x, y = this.y - cameraY;
        ctx.save();
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#222";
        if (this.kind === "hole") {
          const g = ctx.createRadialGradient(x + 27, y + 27, 6, x + 27, y + 27, 30);
          g.addColorStop(0, "#050505"); g.addColorStop(0.75, "#201144"); g.addColorStop(1, "rgba(80,30,130,0)");
          ctx.fillStyle = g;
          circle(x + 27, y + 27, 30, true, false);
          ctx.strokeStyle = "#4d2b8f"; circle(x + 27, y + 27, 22, false, true);
        } else if (this.kind === "ufo") {
          ctx.fillStyle = "#bec7ff";
          ctx.beginPath();
          ctx.ellipse(x + 24, y + 18, 25, 10, 0, 0, Math.PI * 2);
          ctx.fill(); ctx.stroke();
          ctx.fillStyle = "#8cf0ff";
          ctx.beginPath();
          ctx.arc(x + 24, y + 12, 13, Math.PI, 0);
          ctx.closePath(); ctx.fill(); ctx.stroke();
        } else {
          ctx.fillStyle = "#b85cff";
          roundedRect(x + 2, y + 4, 44, 30, 12, true, true);
          ctx.fillStyle = "#fff"; circle(x + 16, y + 16, 7, true, true); circle(x + 32, y + 16, 7, true, true);
          ctx.fillStyle = "#222"; circle(x + 16, y + 17, 2.5, true); circle(x + 32, y + 17, 2.5, true);
          ctx.beginPath();
          ctx.moveTo(x + 10, y + 8); ctx.lineTo(x + 3, y - 4);
          ctx.moveTo(x + 38, y + 8); ctx.lineTo(x + 45, y - 4);
          ctx.stroke();
        }
        ctx.restore();
      }
    }

    class Particle {
      constructor() { this.life = 0; }
      reset(x, y, color, speed = 1) {
        this.x = x; this.y = y;
        this.vx = rand(-2.5, 2.5) * speed;
        this.vy = rand(-3, 1) * speed;
        this.r = rand(2, 5);
        this.color = color;
        this.life = rand(22, 45);
      }
      update(dt) {
        this.life -= dt;
        this.vy += 0.12 * dt;
        this.x += this.vx * dt;
        this.y += this.vy * dt;
      }
      draw() {
        if (this.life <= 0) return;
        ctx.globalAlpha = clamp(this.life / 28, 0, 1);
        ctx.fillStyle = this.color;
        circle(this.x, this.y - cameraY, this.r, true);
        ctx.globalAlpha = 1;
      }
    }

    const player = new Player();

    function resize() {
      W = Math.min(window.innerWidth, MAX_GAME_WIDTH);
      H = window.innerHeight;
      canvas.width = Math.floor(W * dpr);
      canvas.height = Math.floor(H * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      canvas.style.position = "fixed";
      canvas.style.left = "50%";
      canvas.style.transform = "translateX(-50%)";
      canvas.style.width = W + "px";
      canvas.style.height = H + "px";
    }

    function saveSettings() {
      settings.sound = ui.sound.checked;
      settings.vibration = ui.vibration.checked;
      settings.skin = ui.skin.value;
      settings.theme = ui.theme.value;
      storage.set("doodleSettings", settings);
    }

    function setState(next) {
      state = next;
      for (const key in ui.screens) ui.screens[key].classList.toggle("active", key === next);
      ui.pauseBtn.style.visibility = next === "playing" ? "visible" : "hidden";
      if (next === "menu") updateMenu();
      if (next === "leaderboard") renderLeaderboard();
    }

    function newGame() {
      platforms = [];
      bonuses = [];
      enemies = [];
      projectiles = [];
      pools.particles = [];
      cameraY = 0;
      maxHeight = 0;
      score = 0;
      platformsPassed = 0;
      springChain = 0;
      worldTop = H - 42;
      player.reset();

      platforms.push(new Platform(W / 2 - 38, H - 62, "normal"));
      for (let i = 1; i < 11; i++) {
        const y = H - 62 - i * 72;
        platforms.push(new Platform(rand(16, W - 90), y, "normal"));
        worldTop = y;
      }
      ensureWorld();
      setState("playing");
    }

    function ensureWorld() {
      while (worldTop > cameraY - H - 180) {
        const h = Math.max(60, 92 - score * 0.006);
        worldTop -= rand(58, h);
        const difficulty = clamp(score / 6000, 0, 1);
        const type = choosePlatformType(difficulty);
        const p = new Platform(rand(12, W - 88), worldTop, type);
        platforms.push(p);
        if (Math.random() < 0.2 && type !== "breakable") bonuses.push(new Bonus(p));
        if (score > 800 && Math.random() < 0.06 + difficulty * 0.08) enemies.push(new Enemy(worldTop - rand(36, 90)));
      }
    }

    function choosePlatformType(difficulty) {
      let r = Math.random();
      const normal = 0.6 - difficulty * 0.16;
      const moving = 0.15 + difficulty * 0.07;
      const breakable = 0.1 + difficulty * 0.05;
      const springy = 0.1 - difficulty * 0.01;
      if (r < normal) return "normal";
      r -= normal;
      if (r < moving) return "moving";
      r -= moving;
      if (r < breakable) return "breakable";
      r -= breakable;
      if (r < springy) return "springy";
      return "disappear";
    }

    function update(dt) {
      if (state !== "playing") return;
      frameTime += dt;
      musicTimer -= dt;
      if (musicTimer <= 0) {
        playTone([330, 392, 494, 392][Math.floor(frameTime / 18) % 4], 0.035, "triangle", 0.018);
        musicTimer = 18;
      }

      player.update(dt);
      platforms.forEach(p => p.update(dt));
      bonuses.forEach(b => b.update(dt));
      enemies.forEach(e => e.update(dt));
      projectiles.forEach(p => { p.y += p.vy * dt; });
      pools.particles.forEach(p => p.update(dt));

      handleCollisions();
      if (player.y - cameraY < H * 0.42) {
        cameraY = player.y - H * 0.42;
      }

      maxHeight = Math.max(maxHeight, Math.floor(-cameraY));
      score = Math.max(score, maxHeight + platformsPassed * 18);
      ui.score.textContent = String(score);

      cleanup();
      ensureWorld();

      if (player.y - cameraY > H + 120) endGame();
    }

    function handleCollisions() {
      if (player.vy > 0) {
        const footY = player.y + player.h;
        const prevFootY = footY - player.vy;
        for (const p of platforms) {
          if (p.gone || p.breaking > 0 && p.type === "breakable") continue;
          const hit = player.x + player.w * 0.78 > p.x &&
            player.x + player.w * 0.22 < p.x + p.w &&
            footY >= p.y && prevFootY <= p.y + 10 &&
            footY <= p.y + p.h + 16;
          if (!hit) continue;

          platformsPassed++;
          p.touched = true;
          if (p.type === "breakable") {
            p.breaking = 1;
            p.shake = 10;
            springChain = 0;
            playSound("break");
            burst(player.x + player.w / 2, p.y, "#a86b3f", 8);
            break;
          }
          let power = -12;
          let superJump = false;
          if (p.type === "springy" || p.hasSpring && Math.abs(player.x + player.w / 2 - (p.x + p.w * 0.58)) < 24) {
            power = -18;
            superJump = true;
            springChain++;
            if (springChain >= 10) unlock("springMaster");
          } else {
            springChain = 0;
          }
          player.jump(power, superJump);
          burst(player.x + player.w / 2, p.y, superJump ? "#ffd74d" : "#70c461", superJump ? 15 : 6);
          vibrate(superJump ? 38 : 12);
          break;
        }
      }

      for (const b of bonuses) {
        if (!b.gone && rects(player, b)) {
          b.gone = true;
          player.fly = b.kind === "rocket" ? 115 : 78;
          player.invincible = player.fly + 20;
          playSound("ding");
          burst(b.x + b.w / 2, b.y + b.h / 2, "#ffd74d", 22);
          vibrate(45);
        }
      }

      for (const e of enemies) {
        const dx = player.x + player.w / 2 - (e.x + e.w / 2);
        const dy = player.y + player.h / 2 - (e.y + e.h / 2);
        if (Math.abs(dx) < (player.w + e.w) * 0.42 && Math.abs(dy) < (player.h + e.h) * 0.42) {
          if (player.invincible > 0 && e.kind !== "hole") {
            e.y = cameraY + H + 500;
            burst(e.x + e.w / 2, e.y + e.h / 2, "#b85cff", 16);
          } else {
            endGame();
          }
        }
        if (e.kind === "hole") {
          const dist = Math.hypot(dx, dy);
          if (dist < 120) {
            player.vx -= dx / Math.max(40, dist) * 0.22;
            player.vy -= dy / Math.max(40, dist) * 0.08;
          }
        }
      }

      for (const p of projectiles) {
        const dx = player.x + player.w / 2 - p.x;
        const dy = player.y + player.h / 2 - p.y;
        if (Math.hypot(dx, dy) < 24 && player.invincible <= 0) endGame();
      }
    }

    function cleanup() {
      const bottom = cameraY + H + 220;
      platforms = platforms.filter(p => !p.gone && p.y < bottom);
      bonuses = bonuses.filter(b => !b.gone && b.y < bottom);
      enemies = enemies.filter(e => e.y < bottom);
      projectiles = projectiles.filter(p => p.y < bottom && p.y > cameraY - 100);
      pools.particles = pools.particles.filter(p => p.life > 0);
    }

    function endGame() {
      if (state !== "playing") return;
      playSound("boom");
      vibrate(120);
      progress.highScore = Math.max(progress.highScore, score);
      progress.bestHeight = Math.max(progress.bestHeight, maxHeight);
      progress.leaderboard.push({ score, date: new Date().toLocaleDateString() });
      progress.leaderboard.sort((a, b) => b.score - a.score);
      progress.leaderboard = progress.leaderboard.slice(0, 5);
      if (score >= 1000) unlock("first1000");
      if (score >= 5000) unlock("skyWalker");
      storage.set("doodleProgress", progress);
      ui.finalScore.textContent = score;
      ui.finalHigh.textContent = progress.highScore;
      renderAchievements();
      setState("gameover");
    }

    function unlock(id) {
      progress.achievements[id] = true;
    }

    function renderAchievements() {
      const all = [
        ["first1000", "First 1000 points"],
        ["springMaster", "10 springs in a row"],
        ["skyWalker", "Reached 5000 points"]
      ];
      ui.achievements.innerHTML = "";
      for (const [id, label] of all) {
        const li = document.createElement("li");
        li.textContent = (progress.achievements[id] ? "Unlocked: " : "Locked: ") + label;
        ui.achievements.appendChild(li);
      }
    }

    function updateMenu() {
      ui.menuHigh.textContent = progress.highScore;
      ui.menuBest.textContent = progress.bestHeight;
    }

    function renderLeaderboard() {
      ui.leaderboard.innerHTML = "";
      const list = progress.leaderboard.length ? progress.leaderboard : [{ score: 0, date: "No scores yet" }];
      list.forEach(item => {
        const li = document.createElement("li");
        li.textContent = `${item.score} - ${item.date}`;
        ui.leaderboard.appendChild(li);
      });
    }

    function draw() {
      drawBackground();
      platforms.forEach(p => p.draw());
      bonuses.forEach(b => b.draw());
      enemies.forEach(e => e.draw());
      drawProjectiles();
      pools.particles.forEach(p => p.draw());
      if (state !== "menu") player.draw();
    }

    function drawBackground() {
      const theme = settings.theme;
      ctx.fillStyle = theme === "night" ? "#18213a" : theme === "space" ? "#11162c" : theme === "jungle" ? "#eaffdd" : "#fbfbf4";
      ctx.fillRect(0, 0, W, H);
      const grid = 34;
      const offset = ((-cameraY) % grid + grid) % grid;
      ctx.lineWidth = 1;
      ctx.strokeStyle = theme === "night" || theme === "space" ? "rgba(160,190,255,0.16)" : "rgba(83,142,193,0.22)";
      for (let x = 0; x <= W; x += grid) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = offset; y <= H; y += grid) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }

      if (theme === "space") {
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        for (let i = 0; i < 26; i++) {
          const x = (i * 97 + 37) % W;
          const y = (i * 151 + Math.floor(-cameraY * 0.2)) % H;
          circle(x, y, (i % 3) + 1, true);
        }
      } else if (theme === "jungle") {
        ctx.strokeStyle = "rgba(44,130,74,0.3)";
        ctx.lineWidth = 4;
        for (let i = 0; i < 5; i++) {
          const x = (i * 113 + 30) % W;
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.bezierCurveTo(x + 22, H * 0.25, x - 18, H * 0.62, x + 10, H);
          ctx.stroke();
        }
      }
    }

    function drawProjectiles() {
      ctx.save();
      ctx.fillStyle = "#ff5959";
      ctx.strokeStyle = "#222";
      ctx.lineWidth = 2;
      projectiles.forEach(p => circle(p.x, p.y - cameraY, p.r, true, true));
      ctx.restore();
    }

    function drawPlayerSkin(skin, x, y, w, h) {
      ctx.lineWidth = 3;
      ctx.strokeStyle = "#222";
      if (skin === "alien") {
        ctx.fillStyle = "#93e86f";
        roundedRect(x + 5, y + 8, w - 10, h - 12, 18, true, true);
        ctx.fillStyle = "#fff"; circle(x + 17, y + 25, 8, true, true); circle(x + w - 17, y + 25, 8, true, true);
        ctx.fillStyle = "#222"; circle(x + 17, y + 26, 3, true); circle(x + w - 17, y + 26, 3, true);
        ctx.beginPath(); ctx.moveTo(x + 14, y + 10); ctx.lineTo(x + 8, y - 5); ctx.moveTo(x + w - 14, y + 10); ctx.lineTo(x + w - 8, y - 5); ctx.stroke();
      } else if (skin === "ninja") {
        ctx.fillStyle = "#222";
        roundedRect(x + 6, y + 5, w - 12, h - 8, 16, true, true);
        ctx.fillStyle = "#ffe1b7";
        roundedRect(x + 11, y + 20, w - 22, 13, 6, true, true);
        ctx.fillStyle = "#222"; circle(x + 18, y + 27, 2.5, true); circle(x + w - 18, y + 27, 2.5, true);
        ctx.strokeStyle = "#d94a3d"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(x + 7, y + 17); ctx.lineTo(x + w - 7, y + 17); ctx.stroke();
      } else {
        ctx.fillStyle = "#fff7f0";
        roundedRect(x + 5, y + 11, w - 10, h - 11, 18, true, true);
        ctx.fillStyle = "#fff7f0";
        roundedRect(x + 9, y - 8, 10, 24, 7, true, true);
        roundedRect(x + w - 19, y - 8, 10, 24, 7, true, true);
        ctx.fillStyle = "#ffb8c8";
        roundedRect(x + 12, y - 3, 4, 14, 3, true, false);
        roundedRect(x + w - 16, y - 3, 4, 14, 3, true, false);
        ctx.fillStyle = "#fff"; circle(x + 17, y + 28, 7, true, true); circle(x + w - 17, y + 28, 7, true, true);
        ctx.fillStyle = "#222"; circle(x + 17, y + 29, 2.5, true); circle(x + w - 17, y + 29, 2.5, true);
        ctx.fillStyle = "#ff91a9"; circle(x + w / 2, y + 38, 4, true, true);
      }

      if (player.fly > 0) {
        ctx.strokeStyle = "#222";
        ctx.fillStyle = "#ffde59";
        ctx.beginPath();
        ctx.ellipse(x + w / 2 - 9, y - 8, 15, 5, -0.25, 0, Math.PI * 2);
        ctx.ellipse(x + w / 2 + 9, y - 8, 15, 5, 0.25, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
      }
    }

    function drawSpring(x, y, w, h) {
      ctx.strokeStyle = "#222";
      ctx.lineWidth = 2;
      ctx.fillStyle = "#e74242";
      roundedRect(x, y + h - 4, w, 5, 3, true, true);
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const yy = y + i * 4;
        ctx.lineTo(x + (i % 2 ? w - 2 : 2), yy);
      }
      ctx.stroke();
    }

    function burst(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const p = new Particle();
        p.reset(x, y, color, 1.2);
        pools.particles.push(p);
      }
    }

    function addTrail(x, y) {
      if (Math.random() < 0.7) {
        const p = new Particle();
        p.reset(x + rand(-8, 8), y, "#ffd15c", 0.8);
        p.vy = rand(1, 3);
        pools.particles.push(p);
      }
    }

    function roundedRect(x, y, w, h, r, fill, stroke) {
      r = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
      if (fill) ctx.fill();
      if (stroke) ctx.stroke();
    }

    function circle(x, y, r, fill, stroke) {
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      if (fill) ctx.fill();
      if (stroke) ctx.stroke();
    }

    function tri(x1, y1, x2, y2, x3, y3, fill) {
      ctx.beginPath();
      ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.lineTo(x3, y3); ctx.closePath();
      if (fill) ctx.fill();
      ctx.stroke();
    }

    function rects(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function playSound(type) {
      if (!settings.sound) return;
      if (type === "jump") playTone(260, 0.07, "sine", 0.05, 420);
      if (type === "whoosh") playTone(180, 0.18, "sawtooth", 0.08, 760);
      if (type === "ding") playTone(780, 0.12, "triangle", 0.07, 1040);
      if (type === "boom") playTone(95, 0.25, "square", 0.09, 40);
      if (type === "break") playTone(140, 0.08, "square", 0.05, 90);
    }

    function playTone(freq, duration, type, volume, endFreq) {
      if (!settings.sound) return;
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if (endFreq) osc.frequency.exponentialRampToValueAtTime(Math.max(1, endFreq), audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (_) {}
    }

    function vibrate(ms) {
      if (settings.vibration && navigator.vibrate) navigator.vibrate(ms);
    }

    function loop(time) {
      const dt = clamp((time - lastTime) / 16.666, 0, 2.2) || 1;
      lastTime = time;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    function pointerButton(btn, key) {
      const down = e => { e.preventDefault(); keys[key] = true; };
      const up = e => { e.preventDefault(); keys[key] = false; };
      btn.addEventListener("pointerdown", down);
      btn.addEventListener("pointerup", up);
      btn.addEventListener("pointercancel", up);
      btn.addEventListener("pointerleave", up);
    }

    window.addEventListener("resize", resize);
    window.addEventListener("keydown", e => {
      if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = true;
      if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = true;
      if (e.code === "KeyP") togglePause();
      if (e.code === "Space" && state === "menu") newGame();
    });
    window.addEventListener("keyup", e => {
      if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = false;
      if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = false;
    });
    window.addEventListener("deviceorientation", e => {
      if (typeof e.gamma === "number") tiltX = clamp(e.gamma / 24, -1, 1);
    });

    let touchStart = null;
    canvas.addEventListener("pointerdown", e => { touchStart = { x: e.clientX, y: e.clientY }; });
    canvas.addEventListener("pointermove", e => {
      if (!touchStart || state !== "playing") return;
      const dx = e.clientX - touchStart.x;
      keys.left = dx < -18;
      keys.right = dx > 18;
    });
    canvas.addEventListener("pointerup", () => { keys.left = false; keys.right = false; touchStart = null; });

    pointerButton(buttons.left, "left");
    pointerButton(buttons.right, "right");

    function togglePause() {
      if (state === "playing") setState("pause");
      else if (state === "pause") setState("playing");
    }

    buttons.play.addEventListener("click", newGame);
    buttons.retry.addEventListener("click", newGame);
    buttons.settings.addEventListener("click", () => setState("settings"));
    buttons.leader.addEventListener("click", () => setState("leaderboard"));
    buttons.resume.addEventListener("click", () => setState("playing"));
    buttons.pauseMenu.addEventListener("click", () => setState("menu"));
    buttons.overMenu.addEventListener("click", () => setState("menu"));
    buttons.settingsBack.addEventListener("click", () => { saveSettings(); setState("menu"); });
    buttons.leaderBack.addEventListener("click", () => setState("menu"));
    ui.pauseBtn.addEventListener("click", togglePause);
    [ui.sound, ui.vibration, ui.skin, ui.theme].forEach(el => el.addEventListener("change", saveSettings));

    resize();
    updateMenu();
    setState("menu");
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
